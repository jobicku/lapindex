name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Find artifact
        id: artifact
        run: |
          path=$(find build/distributions -name '*.zip' | head -1)
          echo "path=$path" >> $GITHUB_OUTPUT
          echo "name=$(basename $path)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          generate_release_notes: true

      - name: Update updatePlugins.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_NAME="${{ steps.artifact.outputs.name }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${ARTIFACT_NAME}"
          SINCE_BUILD=$(grep 'pluginSinceBuild' gradle.properties | cut -d'=' -f2)

          mkdir -p docs
          cat > docs/updatePlugins.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plugins>
              <plugin id="ru.jobick.lapindex"
                      url="${URL}"
                      version="${VERSION}">
                  <idea-version since-build="${SINCE_BUILD}"/>
                  <description>A plugin for easy work with LAPI dictionaries</description>
              </plugin>
          </plugins>
          EOF

      - name: Commit updated XML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/updatePlugins.xml
          git commit -m "Update updatePlugins.xml for ${{ github.ref_name }}" || echo "No changes"
          git push origin HEAD:master
